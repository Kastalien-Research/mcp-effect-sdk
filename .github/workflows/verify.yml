name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm run verify
      # `verify` is the package-health gate and includes local draft e2e.
      # MCP qualification still requires draft-targeted official conformance
      # evidence from `pnpm run conformance:run`; readiness accounting reports
      # that separately from CI package health.
